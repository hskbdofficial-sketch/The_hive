workflows:
  android-thrift-build:
    name: THRIFTSIX Android Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      vars:
        JAVA_VERSION: "17"
      node: latest

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'master'
          include: true
          source: true

    scripts:
      - name: Set up JDK
        script: |
          jdk-switch --version 17
          echo "JDK 17 configured successfully."

      - name: Build Debug APK
        script: |
          chmod +x gradlew || true
          ./gradlew assembleDebug --no-daemon

      - name: Verify Build Artifacts
        script: |
          echo "==== BUILD ARTIFACTS VERIFIED ===="
          find . -name "*.apk"

    artifacts:
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - ahad50502p@gmail.com
        notify:
          success: true
          failure: true
