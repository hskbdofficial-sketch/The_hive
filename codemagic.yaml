workflows:
  android-thrift-build:
    name: THRIFTSIX Android Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        JAVA_VERSION: "17"
      java: "17"

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'master'
          include: true
          source: true

    scripts:
      - name: Set up JDK
        script: |
          java -version

      - name: Fix Gradle Wrapper JAR
        script: |
          curl -L -o /tmp/gradle-dist.zip \
            "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
          unzip -o /tmp/gradle-dist.zip \
            "gradle-8.7/lib/plugins/gradle-wrapper-*.jar" \
            -d /tmp/gw
          find /tmp/gw -name "gradle-wrapper-*.jar" | \
            xargs -I{} cp {} gradle/wrapper/gradle-wrapper.jar
          echo "JAR replaced: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: Build Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Verify Build Artifacts
        script: |
          echo "==== BUILD ARTIFACTS VERIFIED ===="
          find . -name "*.apk"

    artifacts:
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - ahad50502p@gmail.com
        notify:
          success: true
          failure: true
